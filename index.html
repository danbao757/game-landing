<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>高考冲刺大作战</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #FF6B00, #FF9500);
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh; font-family: 'PingFang SC', sans-serif;
    }
    .card {
      background: #fff; border-radius: 20px; padding: 40px 30px;
      text-align: center; width: 90%; max-width: 360px; box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }
    h1 { font-size: 28px; color: #FF6B00; margin-bottom: 8px; }
    .sub { font-size: 14px; color: #999; margin-bottom: 24px; }
    .btn {
      display: block; margin: 12px auto; width: 80%; padding: 14px;
      font-size: 16px; font-weight: bold; color: #fff;
      background: #FF6B00; border: none; border-radius: 25px;
      text-decoration: none; box-shadow: 0 4px 12px rgba(255,107,0,0.3);
    }
    .btn-outline {
      background: #fff; color: #FF6B00; border: 2px solid #FF6B00;
    }
    .footer { margin-top: 32px; font-size: 12px; color: #BBB; }
  </style>
</head>
<body>
  <div class="card">
    <div style="font-size:60px">🎓</div>
    <h1>高考冲刺大作战</h1>
    <p class="sub">全场互动游戏 · 元服务体验</p>

    <!-- 🔽 这里换成你元服务上架后的 App Linking 链接 -->
    <a href="#" class="btn">📲 打开元服务</a>
    <a href="#" class="btn btn-outline">📥 前往应用市场下载</a>

    <div class="footer">
      请使用 HarmonyOS 手机扫码参与<br>一起为高考生加油 🎉
    </div>
  </div>
</div>
</body>
</html>
